# Automated Release Workflow
# Triggers on version tag push

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Create GitHub release
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build production bundle
        run: npm run build

      - name: Create release tarball
        run: |
          tar -czf living-meta-analysis-${{ github.ref_name }}.tar.gz dist/
          sha256sum living-meta-analysis-${{ github.ref_name }}.tar.gz > checksums.txt

      - name: Generate release notes
        id: release_notes
        run: |
          # Extract version from tag
          VERSION=${{ github.ref_name }}

          # Generate release notes from commits
          cat > release-notes.md << EOF
          # Living Meta-Analysis ${VERSION}

          ## Installation

          \`npm install living-meta-analysis@${VERSION}\`

          ## What's Changed

          EOF

          # Append commit history since last tag
          git log --pretty="- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> release-notes.md

          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          files: |
            living-meta-analysis-${{ github.ref_name }}.tar.gz
            checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to npm (optional - requires NPM_TOKEN)
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Create Docker image
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: livingmeta/living-meta-analysis
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to production (optional)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [publish, docker]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://living-meta-analysis.com
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Add deployment commands here
          # e.g., trigger Vercel deployment, sync S3, etc.
