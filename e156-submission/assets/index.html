<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Living Meta-Analysis Web App - CT.gov Registry-Native Evidence Synthesis">
  <title>Living Meta-Analysis | CT.gov Evidence Synthesis</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Main CSS -->
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <div id="app">
    <!-- App shell -->
    <div class="min-h-screen flex flex-col">
      <!-- Header -->
      <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex justify-between items-center h-16">
            <div class="flex items-center space-x-4">
              <a href="#/" class="flex items-center space-x-2">
                <svg class="w-8 h-8 text-primary-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
                <span class="font-bold text-xl text-gray-900">Living Meta</span>
              </a>
              <nav id="main-nav" class="hidden md:flex space-x-1">
                <!-- Navigation links injected by router -->
              </nav>
            </div>
            <div class="flex items-center space-x-4">
              <div id="sync-status" class="text-sm text-gray-500">
                <!-- Sync status indicator -->
              </div>
              <button id="new-project-btn" class="btn-primary">
                New Project
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- Main content -->
      <main id="main-content" class="flex-1">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
          <!-- Route content injected here -->
          <div id="route-view">
            <!-- Loading state -->
            <div class="flex items-center justify-center h-64">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
          <div class="flex justify-between items-center text-sm text-gray-500">
            <p>Living Meta-Analysis v1.0.0 | CT.gov-only Phase 1</p>
            <p>Data source: <a href="https://clinicaltrials.gov" target="_blank" rel="noopener" class="text-primary-600 hover:underline">ClinicalTrials.gov</a></p>
          </div>
        </div>
      </footer>
    </div>

    <!-- Modal container -->
    <div id="modal-container"></div>

    <!-- Toast container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
  </div>

  <!-- Main app script -->
  <script type="module" src="/src/app.js"></script>
</body>
</html>
